services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./production.env
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  cms:
    build:
      context: ..
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    env_file:
      - ./production.env
    depends_on:
      - postgres
    volumes:
      - payload-media:/app/apps/cms/media
    networks:
      - internal
    ports:
      - "${PAYLOAD_PORT:-3300}:3000"

volumes:
  postgres-data:
  payload-media:

networks:
  internal:
